# =============================================================================
# .github/workflows/app-deploy.yml — Application CI/CD Pipeline
# =============================================================================
# This pipeline runs on every push/PR that changes app files:
#   1. Builds the Docker container image
#   2. Scans it for vulnerabilities with Trivy
#   3. Pushes to ECR
#   4. Deploys to EKS via rolling update

name: App Build and Deploy

on:
  push:
    branches: [main]
    paths: ['app/**']
  pull_request:
    branches: [main]
    paths: ['app/**']

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: wiz-tasky
  EKS_CLUSTER: wiz-exercise-cluster

jobs:
  build-scan-deploy:
    name: Build, Scan & Deploy
    runs-on: ubuntu-latest

    steps:
      # Download repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate with AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Authenticate Docker with ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build the container image
      # Tagged with git commit SHA for traceability — you can always tell
      # exactly which code produced which image
      - name: Build Docker image
        working-directory: app
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Scan for vulnerabilities BEFORE pushing to the registry
      # Checks OS packages (Alpine CVEs) and app dependencies (Go modules)
      # exit-code: '0' means report but don't block (we expect CVEs in outdated Alpine)
      - name: Vulnerability Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      # Push the image to ECR
      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # Deploy to EKS (only on merge to main)
      - name: Deploy to Kubernetes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          aws eks update-kubeconfig --name $EKS_CLUSTER --region us-east-1
          kubectl set image deployment/tasky \
            tasky=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -n wiz-app
          kubectl rollout status deployment/tasky -n wiz-app --timeout=120s
