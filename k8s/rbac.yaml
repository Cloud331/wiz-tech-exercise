apiVersion: v1
kind: ServiceAccount
metadata:
  name: tasky-sa
  namespace: wiz-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tasky-cluster-admin
subjects:
  - kind: ServiceAccount
    name: tasky-sa
    namespace: wiz-app
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
